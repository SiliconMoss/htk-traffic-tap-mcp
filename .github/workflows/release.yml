name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to create the GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG — aborting."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Install with npx directly from this tag:

            ```json
            {
              "mcpServers": {
                "httptoolkit": {
                  "command": "npx",
                  "args": ["-y", "github:SiliconMoss/htk-traffic-tap-mcp#${{ github.ref_name }}"]
                }
              }
            }
            ```

            Or pin to `main` for the latest:

            ```json
            { "args": ["-y", "github:SiliconMoss/htk-traffic-tap-mcp"] }
            ```
